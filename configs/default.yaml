data_dir: data
csv_name: Data_Entry_2017.csv
train_val_list: train_val_list.txt
test_list: test_list.txt
image_size: 224
batch_size: 16
lr: 0.0001
epochs: 15
early_stop_patience: 3
subsample_frac: 1.0
val_frac: 0.15
seed: 42
labels:
  - Atelectasis
  - Cardiomegaly
  - Consolidation
  - Edema
  - Effusion
  - Emphysema
  - Fibrosis
  - Hernia
  - Infiltration
  - Mass
  - Nodule
  - Pleural_Thickening
  - Pneumonia
  - Pneumothorax
deep_dive_labels: [Cardiomegaly, Effusion, Atelectasis, Pneumothorax]
age_bins: [0, 40, 60, 80, 200]
age_bin_labels: ["<40", "40-60", "60-80", "80+"]
checkpoint_dir: checkpoints
results_dir: results
